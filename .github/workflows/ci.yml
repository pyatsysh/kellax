name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Install (with test extras)
        run: uv pip install --system -e ".[test]"
      - name: Run test suite
        run: pytest -q

  examples:
    name: examples (smoke test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Install (with examples extras)
        run: uv pip install --system -e ".[examples]"
      - name: Run every example (must exit 0 and regenerate its figure)
        env:
          MPLBACKEND: Agg
        run: |
          for f in examples/*.py; do
            case "$(basename "$f")" in _style.py) continue ;; esac
            echo "::group::$f"
            python "$f"
            echo "::endgroup::"
          done
      - name: Upload regenerated figures
        uses: actions/upload-artifact@v4
        with:
          name: figures
          path: figures/*.png

  build:
    name: build & version check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Check the dynamic version resolved to kellax.__version__
        run: |
          ls dist/
          VER=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' kellax/__init__.py)
          echo "kellax/__init__.py declares $VER"
          ls dist/ | grep -q "kellax-${VER}" || { echo "::error::built artifacts do not carry version ${VER} (dynamic-version drift)"; exit 1; }
